<!doctype html>
<html lang="und">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title></title>
	<style>/* __BOM_STOCK_OUT_INLINE_CSS__ */</style>
</head>
<body>
	<main class="panel-shell" id="panel-shell" aria-busy="true">
		<div class="boot-status" id="boot-status" role="status">
			<span class="boot-spinner" aria-hidden="true"></span><span id="boot-message">...</span>
		</div>
		<section class="report" id="report" hidden>
			<header class="report-header">
				<dl class="report-meta">
					<div><dt id="source-name-label"></dt><dd id="source-name-value"></dd></div>
					<div><dt id="board-quantity-label"></dt><dd id="board-quantity-value"></dd></div>
					<div><dt id="line-count-label"></dt><dd id="line-count-value"></dd></div>
					<div><dt id="fingerprint-label"></dt><dd id="fingerprint-value"></dd></div>
				</dl>
				<p class="status-banner" id="status-banner" role="status"></p>
				<p class="atomic-notice" id="atomic-notice"></p>
				<ul class="global-issues" id="global-issues" hidden></ul>
			</header>
			<div class="table-region">
				<table>
					<thead><tr>
						<th id="column-part-number"></th>
						<th id="column-name"></th>
						<th id="column-manufacturer-part-number"></th>
						<th id="column-package"></th>
						<th id="column-designators"></th>
						<th id="column-requested-quantity" class="numeric"></th>
						<th id="column-before-quantity" class="numeric"></th>
						<th id="column-after-quantity" class="numeric"></th>
						<th id="column-issue"></th>
					</tr></thead>
					<tbody id="stock-out-rows"></tbody>
				</table>
				<p class="empty-report" id="empty-rows" hidden></p>
			</div>
			<div class="pager" id="pager">
				<button id="previous-page" class="icon-button" type="button"><span aria-hidden="true">&larr;</span></button>
				<span id="page-status" aria-live="polite"></span>
				<button id="next-page" class="icon-button" type="button"><span aria-hidden="true">&rarr;</span></button>
			</div>
			<footer class="actions">
				<p class="operation-status" id="operation-status" aria-live="polite"></p>
				<button id="close" class="button button-secondary" type="button"></button>
				<button id="commit" class="button button-danger" type="button"></button>
			</footer>
		</section>
		<p class="connection-error" id="connection-error" role="alert" hidden></p>
		<dialog class="confirm-dialog" id="confirm-dialog">
			<h2 id="confirm-title"></h2>
			<p id="confirm-message"></p>
			<div class="confirm-actions">
				<button id="confirm-cancel" class="button button-secondary" type="button"></button>
				<button id="confirm-submit" class="button button-danger" type="button"></button>
			</div>
		</dialog>
	</main>
	<script>/* __BOM_STOCK_OUT_INLINE_JS__ */</script>
</body>
</html>
